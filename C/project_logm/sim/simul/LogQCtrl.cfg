[COMMON]
	LOG_QUEUE_MODE		    =	ON          #대문자 ON/OFF
    

[simul]
    LOG_STEP = 0                            #0:TRC,SVC,ERR 1:SVC,ERR 2:ERR 3:OFF
    LOG_FORMAT = 1                          #0:day 1:hour
    
    TRC_LOG = 2                             #0,1,2 설정
    SVC_LOG = 2                             #0,1,2 설정
    ERR_LOG = 2                             #0,1,2 설정
    
    TRC_SMART = 0                           #0:미전송,1:전송
    SVC_SMART = 1                           #0:미전송,1:전송
    ERR_SMART = 0                           #0:미전송,1:전송

